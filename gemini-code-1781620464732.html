  <style>
/* =====================================================
   EpicenterLive — style.css
   Design system: deep space dark / amber signal accent
   ===================================================== */
:root {
  --bg: #0f1117;
  --bg2: #161920;
  --bg3: #1e2130;
  --surface: #252a3a;
  --surface2: #2e3447;
  --border: #333a52;
  --text: #e8ecf4;
  --text2: #9aa3bc;
  --text3: #5a647e;
  --accent: #f59e0b;
  --accent2: #fbbf24;
  --accent-glow: rgba(245,158,11,0.18);
  --red: #ef4444;
  --orange: #f97316;
  --yellow: #eab308;
  --green: #22c55e;
  --blue: #3b82f6;
  --purple: #a855f7;
  --radius: 10px;
  --radius-lg: 16px;
  --shadow: 0 4px 24px rgba(0,0,0,0.45);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
  --font-sans: 'Inter', system-ui, sans-serif;
  --font-mono: 'Space Mono', 'Courier New', monospace;
  --transition: 0.2s ease;
  --header-h: 60px;
  --ticker-h: 36px;
}

.light {
  --bg: #f4f6fb;
  --bg2: #ebeef7;
  --bg3: #e2e6f0;
  --surface: #ffffff;
  --surface2: #f0f2fa;
  --border: #d1d8ee;
  --text: #0f1117;
  --text2: #4a5568;
  --text3: #9aa3bc;
  --accent: #d97706;
  --accent2: #f59e0b;
  --accent-glow: rgba(217,119,6,0.12);
  --shadow: 0 4px 24px rgba(0,0,0,0.10);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
button { font-family: var(--font-sans); cursor: pointer; border: none; background: none; }

.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 20px;
}
.hidden { display: none !important; }

/* Ticker */
#ticker-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--ticker-h);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 16px;
  z-index: 1000;
  overflow: hidden;
}
.ticker-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--accent);
  white-space: nowrap;
  background: var(--accent-glow);
  padding: 2px 8px;
  border-radius: 4px;
  flex-shrink: 0;
}
.ticker-track {
  flex: 1;
  overflow: hidden;
  height: 100%;
  display: flex;
  align-items: center;
}
.ticker-content {
  display: flex;
  flex-wrap: nowrap;
  font-size: 13px;
  color: var(--text2);
  will-change: transform;
  animation: ticker-scroll 55s linear infinite;
}
.ticker-inner {
  white-space: nowrap;
  padding-right: 80px;
  flex-shrink: 0;
}
@keyframes ticker-scroll {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* Header */
#site-header {
  position: fixed;
  top: var(--ticker-h);
  left: 0; right: 0;
  height: var(--header-h);
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  z-index: 999;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.header-inner {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
}
.brand-name {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
}
.header-nav {
  display: flex;
  gap: 16px;
}
.nav-link {
  font-size: 14px;
  color: var(--text2);
  font-weight: 500;
}
.nav-link:hover { color: var(--accent); }

.refresh-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text3);
}
.pulse-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
}

main { padding-top: calc(var(--ticker-h) + var(--header-h) + 24px); }

/* Main Layout Grid */
.main-layout {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 24px;
  margin-top: 16px;
}

/* Section Header styling */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.section-header h2 {
  font-size: 20px;
  font-weight: 600;
}

/* Live Map Container */
#map {
  height: 480px;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  background: var(--bg2);
  margin-bottom: 24px;
  z-index: 1;
}

/* Sidebar Columns */
.sidebar-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  height: max-content;
}

.panel-title {
  font-size: 15px;
  font-weight: 600;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* Feed List styling */
.eq-list-container {
  display: flex;
  flex-direction: column;
  max-height: 620px;
  overflow-y: auto;
}
.eq-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 4px;
  border-bottom: 1px solid var(--border);
  transition: background var(--transition);
  cursor: pointer;
}
.eq-item:hover { background: var(--bg2); }
.eq-badge {
  width: 44px; height: 44px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 14px;
  color: #fff;
  flex-shrink: 0;
}
.eq-info { flex: 1; min-width: 0; }
.eq-title { font-size: 13px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.eq-details { font-size: 11px; color: var(--text2); display: flex; gap: 8px; margin-top: 2px; }
.eq-time-stamp { font-size: 11px; color: var(--text3); font-family: var(--font-mono); text-align: right; }

/* Status indicator badge */
#source-indicator {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 600;
}
#source-indicator.ok { background: rgba(34,197,94,0.15); color: var(--green); }
#source-indicator.fallback { background: rgba(245,158,11,0.15); color: var(--accent); }
#source-indicator.error { background: rgba(239,68,68,0.15); color: var(--red); }

/* Magnitudes scale */
.bg-minor { background: #3b82f
